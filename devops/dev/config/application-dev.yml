# ============================================================
# Framework / bridge properties — kept as-is until Spring Boot
# datasource/ActiveMQ/Redis URL composition is updated.
# ============================================================
activemq:
  broker:
    username: activemqUser
    password: activemqPassword

db:
  server: localhost
  port: 3306
  name: intyg
  username: intyg
  password: intyg
  pool:
    maxSize: 5

logging:
  structured:
    format:
      console: ""

redis:
  password: redis

# ============================================================
# Canonical application overrides for local development.
# These override the empty/default values in application.yml.
# ============================================================
app:
  server:
    internal-port: 8180

  ntjp:
    base-url: "http://localhost:8080/inera-certificate/stubs"
    tls:
      certificate-password: dummy
      key-manager-password: dummy
      truststore-password: dummy

  integration:
    certificate-service:
      base-url: "http://localhost:18030"
    intyg-proxy-service:
      base-url: "http://localhost:18020"

  recipients:
    file: "${application.dir}/config/recipients-dev.json"

  security:
    hash-salt: salt

#unit.mapping.config.path=${application.dir}/config/care-provider-mapping-config.json
