activemq:
  broker:
    username: activemqUser
    password: activemqPassword

db:
  server: localhost
  port: 3306
  name: intyg
  username: intyg
  password: intyg
  pool:
    maxSize: 5

certificateservice:
  base:
    url: "http://localhost:18030"

hash:
  salt: salt

integration:
  intygproxyservice:
    baseurl: "http://localhost:18020"

internal:
  api:
    port: 8180

logging:
  structured:
    format:
      console: ""

redis:
  password: redis

spring:
  data:
    redis:
      password: "${redis.password}"

ntjp:
  base:
    url: "http://localhost:8080/inera-certificate/stubs"
  ws:
    certificate:
      password: dummy
    key:
      manager:
        password: dummy
    truststore:
      password: dummy

recipient:
  file: "${application.dir}/config/recipients-dev.json"

